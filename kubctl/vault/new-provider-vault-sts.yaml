apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: provider-vault
  namespace: mvd
  labels:
    app.kubernetes.io/instance: provider-vault
    app.kubernetes.io/name: vault
spec:
  replicas: 1
  serviceName: provider-vault-internal
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/instance: provider-vault
      app.kubernetes.io/name: vault
      component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: provider-vault
        app.kubernetes.io/name: vault
        component: server
    spec:
      serviceAccountName: provider-vault
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 100
      containers:
        - name: vault
          image: hashicorp/vault:1.21.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              # Start Vault in background
              /usr/local/bin/docker-entrypoint.sh vault server -dev &
              VAULT_PID=$!
              
              # Wait for Vault to be ready
              echo "Waiting for Vault to be ready..."
              until vault status -tls-skip-verify 2>/dev/null; do
                sleep 1
              done
              echo "Vault is ready!"
              
              # Run the restore script
              echo "Running restore script..."
              sh /vault/data/vault-restore.sh || true
              
              # Keep the container running by waiting for Vault process
              wait $VAULT_PID
          env:
            - name: VAULT_ADDR
              value: http://127.0.0.1:8200
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: root
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: '[::]:8200'
            - name: HOME
              value: /home/vault
            - name: SKIP_CHOWN
              value: "true"
            - name: SKIP_SETCAP
              value: "true"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: VAULT_API_ADDR
              value: http://$(POD_IP):8200
          ports:
            - containerPort: 8200
              name: http
              protocol: TCP
            - containerPort: 8201
              name: https-internal
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - vault status -tls-skip-verify
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: home
              mountPath: /home/vault
            - name: data
              mountPath: /vault/data
      volumes:
        - name: home
          emptyDir: {}
  # THIS MUST BE AT THE SAME LEVEL AS 'template:' - NOT INSIDE IT
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp2
        resources:
          requests:
            storage: 5Gi